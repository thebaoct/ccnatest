<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phòng Lab Mô Phỏng Mạng Tương Tác</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; touch-action: manipulation; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // Get Icons from global Lucide object
        const { Play, CheckCircle2, XCircle, Network, Info, ServerCog, Wifi, Monitor, Smartphone, Globe, ShieldAlert, Router: RouterIcon, Layers } = window.lucide;

        // Function to create Icon components from Lucide
        const IconComponent = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        root: iconRef.current.parentNode
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className} ref={iconRef}></i>;
        };

        // --- TOPOLOGY ICONS (Custom SVGs) ---
        const TopoRouter = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <circle cx="50" cy="50" r="45" fill="#0284c7" />
                <circle cx="50" cy="50" r="35" fill="none" stroke="#7dd3fc" strokeWidth="2" strokeDasharray="6,4" />
                <g fill="#ffffff">
                    <path d="M50 15 L58 28 L42 28 Z" /><rect x="47" y="28" width="6" height="15" />
                    <path d="M50 85 L58 72 L42 72 Z" /><rect x="47" y="57" width="6" height="15" />
                    <path d="M15 50 L28 42 L28 58 Z" /><rect x="28" y="47" width="15" height="6" />
                    <path d="M85 50 L72 42 L72 58 Z" /><rect x="57" y="47" width="15" height="6" />
                </g>
            </svg>
        );

        const TopoFirewall = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="10" y="15" width="80" height="70" rx="4" fill="#dc2626" />
                <g stroke="#fca5a5" strokeWidth="3">
                    <line x1="10" y1="38" x2="90" y2="38" />
                    <line x1="10" y1="62" x2="90" y2="62" />
                    <line x1="36" y1="15" x2="36" y2="38" />
                    <line x1="64" y1="15" x2="64" y2="38" />
                    <line x1="23" y1="38" x2="23" y2="62" />
                    <line x1="50" y1="38" x2="50" y2="62" />
                    <line x1="77" y1="38" x2="77" y2="62" />
                    <line x1="36" y1="62" x2="36" y2="85" />
                    <line x1="64" y1="62" x2="64" y2="85" />
                </g>
            </svg>
        );

        const TopoL2Switch = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="10" y="25" width="80" height="50" rx="6" fill="#0284c7" />
                <g fill="#ffffff">
                    <path d="M 75 35 L 85 40 L 75 45 Z" /><rect x="15" y="38" width="60" height="4" />
                    <path d="M 25 55 L 15 60 L 25 65 Z" /><rect x="25" y="58" width="60" height="4" />
                </g>
            </svg>
        );

        const TopoL3Switch = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="10" y="20" width="80" height="60" rx="6" fill="#0284c7" />
                <circle cx="50" cy="50" r="18" fill="#ffffff" />
                <g fill="#0284c7">
                    <path d="M50 36 L55 41 L45 41 Z" />
                    <path d="M50 64 L55 59 L45 59 Z" />
                    <path d="M36 50 L41 45 L41 55 Z" />
                    <path d="M64 50 L59 45 L59 55 Z" />
                </g>
            </svg>
        );

        const TopoWLC = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="10" y="20" width="80" height="60" rx="4" fill="#475569" />
                <rect x="15" y="30" width="70" height="15" rx="2" fill="#94a3b8" />
                <rect x="15" y="55" width="70" height="15" rx="2" fill="#94a3b8" />
                <circle cx="75" cy="37.5" r="3" fill="#22c55e" />
                <circle cx="75" cy="62.5" r="3" fill="#22c55e" />
                <circle cx="65" cy="37.5" r="3" fill="#3b82f6" />
                <circle cx="65" cy="62.5" r="3" fill="#ef4444" />
                <rect x="20" y="35" width="20" height="5" rx="1" fill="#cbd5e1" />
                <rect x="20" y="60" width="20" height="5" rx="1" fill="#cbd5e1" />
            </svg>
        );

        const TopoAP = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <path d="M 20 65 Q 50 20 80 65 Z" fill="#f1f5f9" />
                <rect x="15" y="65" width="70" height="10" rx="5" fill="#cbd5e1" />
                <circle cx="50" cy="70" r="3" fill="#22c55e" />
                <g stroke="#94a3b8" strokeWidth="4" strokeLinecap="round">
                    <line x1="30" y1="45" x2="15" y2="15" />
                    <line x1="70" y1="45" x2="85" y2="15" />
                </g>
                <g fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round">
                    <path d="M 35 30 Q 50 15 65 30" />
                    <path d="M 42 40 Q 50 30 58 40" />
                </g>
            </svg>
        );

        const TopoPC = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="15" y="20" width="70" height="50" rx="4" fill="#334155" />
                <rect x="20" y="25" width="60" height="35" rx="2" fill="#bae6fd" />
                <path d="M 45 70 L 40 85 L 60 85 L 55 70 Z" fill="#64748b" />
                <rect x="30" y="85" width="40" height="6" rx="3" fill="#475569" />
                <line x1="25" y1="65" x2="75" y2="65" stroke="#475569" strokeWidth="2" strokeLinecap="round" />
            </svg>
        );

        const TopoPhone = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <rect x="30" y="10" width="40" height="80" rx="6" fill="#1e293b" />
                <rect x="34" y="20" width="32" height="60" rx="3" fill="#bae6fd" />
                <circle cx="50" cy="85" r="3" fill="#475569" />
                <line x1="45" y1="15" x2="55" y2="15" stroke="#475569" strokeWidth="2" strokeLinecap="round" />
            </svg>
        );

        const TopoInternet = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <path d="M 25 60 A 15 15 0 0 1 45 45 A 25 25 0 0 1 85 55 A 15 15 0 0 1 75 80 L 25 80 A 15 15 0 0 1 25 60 Z" fill="#0ea5e9" />
                <text x="52" y="65" fill="#ffffff" fontSize="16" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">INTERNET</text>
            </svg>
        );

        // --- DATA: DEVICES ---
        const devices = {
            internet: { id: 'internet', type: 'Internet', name: 'Internet / WAN', icon: TopoInternet, x: 400, y: 50, 
                desc: 'Mạng toàn cầu. Nơi chứa các dịch vụ Web, Cloud nằm ngoài vùng kiểm soát doanh nghiệp.',
                detail: 'Trong thực tế, doanh nghiệp thuê đường truyền từ ISP (như VNPT, Viettel). Tốc độ phụ thuộc vào gói cước.'
            },
            firewall: { id: 'firewall', type: 'Firewall', name: 'Tường lửa', icon: TopoFirewall, x: 400, y: 150, 
                desc: 'Thiết bị bảo mật ở cửa ngõ. Kiểm soát và lọc toàn bộ dữ liệu ra/vào mạng nội bộ.',
                detail: 'Như nhân viên an ninh tòa nhà. Nó áp dụng các "Luật" để chặn IP lạ, chặn web độc hại, chống tấn công DDoS.'
            },
            router: { id: 'router', type: 'Router', name: 'Bộ định tuyến', icon: TopoRouter, x: 400, y: 250, 
                desc: 'Tìm đường đi tốt nhất (Routing) để kết nối các mạng khác nhau (VD: LAN ra Internet).',
                detail: 'Dùng địa chỉ IP để tra "Bảng định tuyến". Router quyết định cổng đi nhanh nhất, thực hiện NAT để ra mạng ngoài.'
            },
            l3switch: { id: 'l3switch', type: 'L3 Switch', name: 'L3 Switch (Core)', icon: TopoL3Switch, x: 400, y: 350, 
                desc: 'Định tuyến IP nội bộ (giữa các VLAN) tốc độ cực cao, giảm tải cho Router.',
                detail: 'Sử dụng chip phần cứng (ASIC) chuyên dụng để định tuyến giữa các phòng ban nội bộ nhanh hơn Router rất nhiều.'
            },
            wlc: { id: 'wlc', type: 'Controller', name: 'WLAN Controller', icon: TopoWLC, x: 230, y: 350, 
                desc: 'Bộ não quản lý hàng trăm Access Point, phát cấu hình và mật khẩu đồng loạt.',
                detail: 'Đẩy cấu hình xuống AP tự động, quản lý chuyển vùng (Roaming) để người dùng đi lại không rớt mạng.'
            },
            l2switch: { id: 'l2switch', type: 'L2 Switch', name: 'L2 Switch', icon: TopoL2Switch, x: 230, y: 470, 
                desc: 'Chia cổng mạng nội bộ. Chuyển tiếp dữ liệu dựa trên địa chỉ MAC thiết bị.',
                detail: 'Chỉ hiểu địa chỉ MAC vật lý. Đẩy dữ liệu trực tiếp đến đúng máy đích giúp tốc độ truyền tải đạt mức tối đa.'
            },
            ap: { id: 'ap', type: 'Access Point', name: 'Access Point', icon: TopoAP, x: 570, y: 470, 
                desc: 'Phát sóng Wi-Fi. Chuyển hóa sóng vô tuyến thành dữ liệu mạng có dây.',
                detail: 'Đóng vai trò "cây cầu" đưa thiết bị không dây vào mạng LAN. Nhận mọi lệnh điều khiển từ thiết bị WLC.'
            },
            pc1: { id: 'pc1', type: 'PC', name: 'PC 1 (Kế toán)', icon: TopoPC, x: 130, y: 570, 
                desc: 'Máy tính dùng mạng cáp đồng (Ethernet) thuộc VLAN Kế toán.',
                detail: 'Nguồn phát/đích nhận dữ liệu chính trong hệ thống.'
            },
            pc2: { id: 'pc2', type: 'PC', name: 'PC 2 (Kế toán)', icon: TopoPC, x: 330, y: 570, 
                desc: 'Máy tính cùng VLAN Kế toán với PC 1.',
                detail: 'Giao tiếp trực tiếp với PC1 qua L2 Switch mà không cần định tuyến.'
            },
            phone: { id: 'phone', type: 'Phone', name: 'Điện thoại (Khách)', icon: TopoPhone, x: 570, y: 570, 
                desc: 'Thiết bị di động của Khách kết nối qua Wi-Fi (VLAN Khách).',
                detail: 'Tách biệt bảo mật với Kế toán. Thường chỉ được phép ra Internet chứ không được vào Server nội bộ.'
            },
        };

        // --- DATA: CONNECTIONS ---
        const links = [
            { source: 'internet', target: 'firewall' },
            { source: 'firewall', target: 'router' },
            { source: 'router', target: 'l3switch' },
            { source: 'l3switch', target: 'l2switch' },
            { source: 'l3switch', target: 'wlc' },
            { source: 'wlc', target: 'l2switch', dashed: true },
            { source: 'l3switch', target: 'ap' },
            { source: 'wlc', target: 'ap', dashed: true },
            { source: 'l2switch', target: 'pc1' },
            { source: 'l2switch', target: 'pc2' },
            { source: 'ap', target: 'phone', dashed: true },
        ];

        // --- DATA: SCENARIOS ---
        const scenarios = [
            {
                id: 1,
                title: 'PC1 truy cập dữ liệu trên PC2 (Cùng mạng)',
                desc: 'Dữ liệu chỉ chạy qua Switch Lớp 2.',
                path: ['pc1', 'l2switch', 'pc2'],
                logs: {
                    'pc1': 'Đóng gói dữ liệu thành Frame, kèm địa chỉ MAC của PC2 gửi ra cáp.',
                    'l2switch': 'Đọc MAC đích. Phát hiện PC2 ở cổng số 2, đẩy thẳng gói tin sang (Không cần định tuyến).',
                    'pc2': 'Nhận và mở gói tin thành công.'
                },
                status: 'success'
            },
            {
                id: 2,
                title: 'PC1 gửi file sang Điện thoại (Khác mạng)',
                desc: 'Cần L3 Switch định tuyến nội bộ.',
                path: ['pc1', 'l2switch', 'l3switch', 'ap', 'phone'],
                logs: {
                    'pc1': 'Khác mạng, gửi dữ liệu lên Default Gateway (IP L3 Switch).',
                    'l2switch': 'Đẩy nguyên Frame lên cổng nối với Core Switch.',
                    'l3switch': 'Đọc IP. Tra bảng định tuyến, đẩy dữ liệu sang nhánh mạng của Khách (xuống AP).',
                    'ap': 'Chuyển dữ liệu điện tử thành sóng vô tuyến và phát đi.',
                    'phone': 'Bắt sóng Wi-Fi và nhận thành công.'
                },
                status: 'success'
            },
            {
                id: 3,
                title: 'Điện thoại truy cập Web bị cấm',
                desc: 'Firewall chặn các truy cập ra ngoài.',
                path: ['phone', 'ap', 'l3switch', 'router', 'firewall'],
                logs: {
                    'phone': 'Khách gửi yêu cầu vào một trang web bị cấm.',
                    'ap': 'Nhận sóng và đẩy qua mạng lõi.',
                    'l3switch': 'Nhận thấy là IP ngoài Internet, đẩy lên cho Router.',
                    'router': 'Tra bảng, tìm đường đẩy ra Firewall.',
                    'firewall': 'Kiểm tra luật. Phát hiện vi phạm -> HỦY (DROP) gói tin lập tức.'
                },
                status: 'blocked'
            }
        ];

        function App() {
            const [selectedDevice, setSelectedDevice] = React.useState(devices.router);
            const [activeScenario, setActiveScenario] = React.useState(null);
            const [packetPos, setPacketPos] = React.useState(null);
            const [currentStep, setCurrentStep] = React.useState(-1);
            const [isPlaying, setIsPlaying] = React.useState(false);

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            React.useEffect(() => {
                let timer;
                if (isPlaying && activeScenario && currentStep < activeScenario.path.length) {
                    const deviceId = activeScenario.path[currentStep];
                    const device = devices[deviceId];
                    
                    setPacketPos({ x: device.x, y: device.y });
                    setSelectedDevice(device);

                    timer = setTimeout(() => {
                        if (currentStep === activeScenario.path.length - 1) {
                            setIsPlaying(false);
                        } else {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 3500); 
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, activeScenario]);

            const startSimulation = (scenario) => {
                setActiveScenario(scenario);
                setCurrentStep(0);
                setIsPlaying(true);
                const firstDevice = devices[scenario.path[0]];
                setPacketPos({ x: firstDevice.x, y: firstDevice.y });
                setSelectedDevice(firstDevice);
            };

            const stopSimulation = () => {
                setIsPlaying(false);
                setPacketPos(null);
                setCurrentStep(-1);
                setActiveScenario(null);
            };

            return (
                <div className="flex flex-col h-[100dvh] w-full bg-slate-100 font-sans text-slate-800">
                    
                    {/* Header Bar */}
                    <div className="h-12 md:h-14 bg-indigo-900 text-white flex items-center px-4 md:px-6 shadow-md shrink-0 z-40">
                        <IconComponent name="network" size={20} className="mr-2" />
                        <h1 className="text-base md:text-xl font-bold tracking-wide truncate">THE BÁO: Network Lab</h1>
                        <div className="ml-auto text-xs md:text-sm text-indigo-200 hidden sm:block">Mô phỏng chức năng thiết bị mạng</div>
                    </div>

                    <div className="flex flex-col lg:flex-row flex-1 overflow-hidden">
                        
                        {/* LEFT/TOP PANEL: NETWORK TOPOLOGY */}
                        <div className="h-[45%] lg:h-auto lg:w-[55%] xl:w-[60%] flex flex-col relative bg-white border-b lg:border-b-0 lg:border-r border-slate-200 shadow-inner">
                            <h2 className="absolute top-2 left-3 md:top-4 md:left-4 text-xs md:text-lg font-bold text-slate-700 flex items-center gap-2 z-30 bg-white/80 rounded px-2 py-1 backdrop-blur-sm">
                                Mô Hình Mạng Doanh Nghiệp
                            </h2>
                            
                            {/* Canvas Container - Tự động scale theo màn hình (responsive scale) */}
                            <div className="flex-1 overflow-hidden relative flex items-center justify-center bg-[#f8fafc]">
                                <div className="relative w-[800px] h-[650px] transform origin-center 
                                                scale-[0.42] min-[380px]:scale-[0.48] sm:scale-[0.6] md:scale-[0.7] lg:scale-[0.8] xl:scale-[0.9] 2xl:scale-100">
                                    
                                    {/* Background zones */}
                                    <div className="absolute top-[500px] left-[50px] w-[350px] h-[150px] bg-blue-50/80 rounded-3xl border-2 border-blue-200 border-dashed pointer-events-none"></div>
                                    <div className="absolute top-[500px] left-[500px] w-[200px] h-[150px] bg-green-50/80 rounded-3xl border-2 border-green-200 border-dashed pointer-events-none"></div>
                                    <div className="absolute top-[510px] left-[70px] text-blue-500 font-bold uppercase text-xs">VLAN 10: Kế toán</div>
                                    <div className="absolute top-[510px] left-[520px] text-green-500 font-bold uppercase text-xs">VLAN 20: Khách (Wi-Fi)</div>

                                    {/* Draw Lines */}
                                    <svg className="absolute top-0 left-0 w-full h-full pointer-events-none">
                                        {links.map((link, idx) => {
                                            const src = devices[link.source];
                                            const tgt = devices[link.target];
                                            return (
                                                <line
                                                    key={idx}
                                                    x1={src.x}
                                                    y1={src.y}
                                                    x2={tgt.x}
                                                    y2={tgt.y}
                                                    stroke={link.dashed ? "#cbd5e1" : "#94a3b8"}
                                                    strokeWidth="3"
                                                    strokeDasharray={link.dashed ? "6,6" : "none"}
                                                />
                                            );
                                        })}
                                    </svg>

                                    {/* Draw Devices */}
                                    {Object.values(devices).map((device) => {
                                        const Icon = device.icon;
                                        const isSelected = selectedDevice?.id === device.id;
                                        const isPulsing = isPlaying && activeScenario?.path[currentStep] === device.id;

                                        return (
                                            <div
                                                key={device.id}
                                                onClick={() => setSelectedDevice(device)}
                                                className={`absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center cursor-pointer transition-all duration-300 z-10
                                                    ${isSelected ? 'scale-110 z-20' : 'hover:scale-105'}`}
                                                style={{ left: device.x, top: device.y }}
                                            >
                                                <div className={`relative transition-all rounded-xl p-1 w-16 h-16 bg-white
                                                    ${isSelected ? 'ring-4 ring-indigo-400 shadow-2xl' : 'drop-shadow-md'}
                                                    ${isPulsing ? 'animate-pulse ring-4 ring-yellow-400 bg-yellow-50' : ''}
                                                `}>
                                                    <Icon />
                                                </div>
                                                <span className={`mt-2 text-xs font-bold px-2 py-1 rounded-md bg-white border whitespace-nowrap
                                                    ${isSelected ? 'text-indigo-800 border-indigo-500 shadow-md' : 'text-slate-600 border-slate-200 shadow-sm'}
                                                    ${isPulsing ? 'bg-yellow-100 border-yellow-400 text-yellow-800' : ''}
                                                `}>
                                                    {device.name}
                                                </span>
                                            </div>
                                        );
                                    })}

                                    {/* Draw Packet (Animation) */}
                                    {packetPos && (
                                        <div 
                                            className="absolute transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-yellow-400 rounded-full border-2 border-white shadow-[0_0_20px_rgba(250,204,21,0.9)] transition-all duration-[2000ms] ease-in-out z-50 flex items-center justify-center"
                                            style={{ left: packetPos.x, top: packetPos.y }}
                                        >
                                            <div className="w-2 h-2 bg-yellow-800 rounded-full animate-ping"></div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="absolute bottom-2 left-2 md:bottom-4 md:right-4 md:left-auto text-[10px] md:text-xs font-semibold text-slate-500 bg-white/90 p-1.5 px-2 md:p-2 rounded shadow backdrop-blur flex items-center gap-1.5 border border-slate-200">
                                <IconComponent name="info" size={14}/> Nhấn vào thiết bị để xem chi tiết
                            </div>
                        </div>

                        {/* RIGHT/BOTTOM PANEL: INFO & SIMULATION */}
                        <div className="h-[55%] lg:h-auto lg:w-[45%] xl:w-[40%] bg-slate-50 flex flex-col z-20 overflow-hidden">
                            
                            {/* Device Info Area (Nửa trên của khung bên phải) */}
                            <div className="h-1/2 p-3 sm:p-4 lg:p-6 bg-white border-b border-slate-200 shadow-sm overflow-y-auto shrink-0 flex flex-col relative custom-scrollbar">
                                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                                
                                <div className="flex items-start gap-3 sm:gap-4 mb-3 sm:mb-4">
                                    <div className={`w-12 h-12 sm:w-14 sm:h-14 p-2 rounded-xl bg-slate-50 border border-slate-200 shadow-sm flex items-center justify-center shrink-0`}>
                                        {selectedDevice && <selectedDevice.icon />}
                                    </div>
                                    <div>
                                        <h3 className="text-lg sm:text-xl md:text-2xl font-bold text-slate-800 leading-tight">{selectedDevice.name}</h3>
                                        <div className="inline-block px-2 py-0.5 mt-1 sm:mt-2 text-[10px] sm:text-xs font-bold text-indigo-700 bg-indigo-100 rounded-full border border-indigo-200">
                                            Role: {selectedDevice.type}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="space-y-3 sm:space-y-4">
                                    <div>
                                        <p className="text-slate-700 text-xs sm:text-sm font-medium bg-slate-100/80 p-2 sm:p-3 rounded-lg border border-slate-200">
                                            {selectedDevice.desc}
                                        </p>
                                    </div>
                                    
                                    <div>
                                        <h4 className="font-bold text-slate-600 mb-1 sm:mb-2 text-[11px] sm:text-sm flex items-center gap-1 uppercase tracking-wider">
                                            <IconComponent name="info" size={14} className="text-blue-500"/> Giải thích thực tế
                                        </h4>
                                        <p className="text-slate-600 text-[11px] sm:text-sm leading-relaxed bg-blue-50/40 p-3 sm:p-4 rounded-lg border border-blue-100">
                                            {selectedDevice.detail}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Simulation Controls Area (Nửa dưới của khung bên phải) */}
                            <div className="h-1/2 p-3 sm:p-4 lg:p-6 flex flex-col overflow-hidden bg-slate-50">
                                <h3 className="text-[11px] sm:text-sm font-bold text-slate-400 uppercase tracking-wider mb-2 sm:mb-4 pb-1 sm:pb-2 border-b flex items-center gap-1.5 sm:gap-2">
                                    <IconComponent name="play" size={14} className="text-indigo-600 sm:w-4 sm:h-4" /> 
                                    <span>Mô Phỏng Gói Tin (Packet Flow)</span>
                                </h3>
                                
                                {!isPlaying && !activeScenario ? (
                                    <div className="space-y-2 sm:space-y-3 overflow-y-auto pr-1 pb-4 custom-scrollbar flex-1">
                                        {scenarios.map(scen => (
                                            <button
                                                key={scen.id}
                                                onClick={() => startSimulation(scen)}
                                                className="w-full text-left p-3 sm:p-4 bg-white border border-slate-200 rounded-xl hover:border-indigo-400 active:bg-indigo-50 transition-all group relative overflow-hidden flex flex-col shadow-sm"
                                            >
                                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500 transform origin-bottom scale-y-0 group-hover:scale-y-100 transition-transform"></div>
                                                <div className="font-bold text-slate-800 group-hover:text-indigo-700 ml-1 sm:ml-2 text-xs sm:text-base leading-tight">{scen.id}. {scen.title}</div>
                                                <div className="text-[10px] sm:text-xs text-slate-500 mt-1 sm:mt-1.5 ml-1 sm:ml-2 bg-slate-50 inline-block p-1 rounded">{scen.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full overflow-hidden">
                                        <div className="bg-white border border-slate-200 shadow-sm p-2.5 sm:p-3 rounded-lg sm:rounded-xl mb-3 shrink-0 flex justify-between items-center">
                                            <div className="overflow-hidden pr-2">
                                                <h4 className="font-bold text-indigo-900 text-xs sm:text-sm mb-0.5 truncate">{activeScenario?.title}</h4>
                                                <div className="text-[10px] sm:text-xs font-semibold text-slate-500">
                                                    Trạm: {currentStep + 1} / {activeScenario.path.length}
                                                </div>
                                            </div>
                                            <button 
                                                onClick={stopSimulation}
                                                className="px-2.5 py-1.5 sm:px-3 sm:py-2 text-[10px] sm:text-xs bg-slate-100 text-slate-600 hover:bg-red-500 hover:text-white active:bg-red-600 rounded-lg font-bold transition-colors shadow-sm whitespace-nowrap shrink-0"
                                            >
                                                Dừng lại
                                            </button>
                                        </div>

                                        {/* FLOW MAP (MINDMAP) */}
                                        <div className="flex-1 overflow-y-auto bg-white border border-slate-200 rounded-lg sm:rounded-xl p-3 sm:p-5 relative custom-scrollbar">
                                            <div className="absolute top-6 bottom-6 left-[22px] sm:left-[34px] w-0.5 sm:w-1 bg-slate-100 rounded-full z-0"></div>

                                            {activeScenario.path.map((deviceId, idx) => {
                                                const device = devices[deviceId];
                                                const Icon = device.icon;
                                                const isActive = currentStep === idx;
                                                const isPassed = currentStep > idx;
                                                const isPending = currentStep < idx;
                                                const isLastNode = idx === activeScenario.path.length - 1;
                                                
                                                return (
                                                    <div key={idx} className="relative z-10 flex gap-3 sm:gap-5 mb-5 sm:mb-7 group">
                                                        
                                                        {/* Node Icon */}
                                                        <div className="relative flex flex-col items-center shrink-0 w-8 sm:w-12">
                                                            <div className={`w-8 h-8 sm:w-12 sm:h-12 rounded-full flex items-center justify-center border-[3px] sm:border-4 transition-all duration-500 z-10 bg-white
                                                                ${isPassed ? 'border-indigo-500' : ''}
                                                                ${isActive ? 'border-yellow-400 ring-2 sm:ring-4 ring-yellow-100 scale-110 shadow-md' : ''}
                                                                ${isPending ? 'border-slate-200 grayscale opacity-50' : ''}
                                                            `}>
                                                                <div className="w-4 h-4 sm:w-7 sm:h-7"><Icon /></div>
                                                            </div>

                                                            {/* Connected Line active state */}
                                                            {!isLastNode && (
                                                                <div className={`absolute top-8 sm:top-12 w-0.5 sm:w-1 h-[calc(100%+20px)] sm:h-[calc(100%+28px)] transition-colors duration-1000 -z-10
                                                                    ${isPassed ? 'bg-indigo-500' : 'bg-transparent'}
                                                                `}></div>
                                                            )}
                                                        </div>

                                                        {/* Node Content / Log */}
                                                        <div className={`flex-1 pt-0.5 sm:pt-1 transition-all duration-500 ${isPending ? 'opacity-40' : 'opacity-100'}`}>
                                                            <div className="font-bold text-slate-800 flex items-center gap-1.5 sm:gap-2 text-[11px] sm:text-sm">
                                                                {device.name}
                                                                {isPassed && <IconComponent name="check-circle-2" className="text-indigo-500 w-3 h-3 sm:w-4 sm:h-4" />}
                                                            </div>
                                                            
                                                            {(isActive || isPassed) && (
                                                                <div className={`mt-1.5 sm:mt-2 text-[10px] sm:text-[13px] p-2 sm:p-3 rounded-lg border leading-relaxed
                                                                    ${isActive ? 'bg-yellow-50 border-yellow-200 text-yellow-900 shadow-inner' : 'bg-slate-50 border-slate-100 text-slate-600'}
                                                                `}>
                                                                    {activeScenario.logs[deviceId]}
                                                                </div>
                                                            )}
                                                            
                                                            {/* Result Tag for Last Node */}
                                                            {isLastNode && (isActive || isPassed) && !isPlaying && (
                                                                <div className={`mt-2 sm:mt-3 inline-flex items-center gap-1 sm:gap-2 px-2 py-1 sm:px-3 sm:py-1.5 rounded sm:rounded-lg text-[10px] sm:text-sm font-bold animate-fadeIn shadow-sm
                                                                    ${activeScenario.status === 'success' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}
                                                                `}>
                                                                    {activeScenario.status === 'success' ? <IconComponent name="check-circle-2" className="w-3 h-3 sm:w-4 sm:h-4"/> : <IconComponent name="x-circle" className="w-3 h-3 sm:w-4 sm:h-4"/>}
                                                                    {activeScenario.status === 'success' ? 'Đã đến đích!' : 'Gói tin bị chặn!'}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
